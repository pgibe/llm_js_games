<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Picker Camera</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #000;
            overflow: hidden; /* Evita lo scroll */
        }

        /* --- SEZIONE 1: CAMERA (Circa 2/3 dello spazio) --- */
        #camera-container {
            flex: 2; /* Occupa 2 parti dello spazio disponibile */
            position: relative;
            background-color: #222;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Riempie l'area tagliando i bordi se necessario */
            display: block;
        }

        /* Canvas nascosto usato solo per leggere i pixel */
        #capture-canvas {
            display: none;
        }

        /* Messaggio di caricamento */
        #loading-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            z-index: 10;
        }

        /* --- SEZIONE 2: GRAFICO RGB (Larghezza logica 765px) --- */
        #rgb-chart-wrapper {
            background-color: #000;
            height: 60px; /* Altezza fissa per le barre */
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            overflow: hidden;
        }

        #rgb-chart-scale {
            /* Questo contenitore ha la larghezza fissa richiesta */
            width: 765px;
            height: 100%;
            display: flex;
            background-color: #000;
            /* Se lo schermo è piccolo, scaliamo tutto per farlo entrare */
            transform-origin: center;
        }

        .color-bar {
            height: 100%;
            transition: width 0.2s ease-out;
            width: 0px; /* Valore iniziale */
        }

        #bar-red { background-color: #ff0000; }
        #bar-green { background-color: #00ff00; }
        #bar-blue { background-color: #0000ff; }

        /* --- SEZIONE 3: RISULTATO E CODICE (Resto dello spazio) --- */
        #result-area {
            flex: 1; /* Occupa lo spazio rimanente */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: background-color 0.2s;
            background-color: #333; /* Colore iniziale */
        }

        #hex-code {
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 8px;
        }
        
        p.label {
            margin-bottom: 5px;
            opacity: 0.8;
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

    <div id="camera-container">
        <div id="loading-msg">Attiva la camera...</div>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="capture-canvas"></canvas>
    </div>

    <div id="rgb-chart-wrapper">
        <div id="rgb-chart-scale">
            <div id="bar-red" class="color-bar"></div>
            <div id="bar-green" class="color-bar"></div>
            <div id="bar-blue" class="color-bar"></div>
        </div>
    </div>

    <div id="result-area">
        <p class="label">COLORE SELEZIONATO</p>
        <div id="hex-code">Tocca il video</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('capture-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const loadingMsg = document.getElementById('loading-msg');
        
        const barRed = document.getElementById('bar-red');
        const barGreen = document.getElementById('bar-green');
        const barBlue = document.getElementById('bar-blue');
        
        const resultArea = document.getElementById('result-area');
        const hexLabel = document.getElementById('hex-code');
        const chartScale = document.getElementById('rgb-chart-scale');
        const chartWrapper = document.getElementById('rgb-chart-wrapper');

        // 1. Setup della Camera
        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment', // Camera posteriore
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                loadingMsg.style.display = 'none';
            } catch (err) {
                loadingMsg.textContent = "Errore: impossibile accedere alla camera. Assicurati di usare HTTPS.";
                console.error("Errore camera:", err);
            }
        }

        // 2. Gestione del ridimensionamento del grafico RGB
        // La richiesta specifica una larghezza di 765px. Su mobile questo uscirebbe dallo schermo.
        // Usiamo CSS transform per scalare l'intero blocco 765px affinché entri nella larghezza del telefono.
        function fitChartToScreen() {
            const wrapperWidth = chartWrapper.clientWidth;
            const requiredWidth = 765;
            // Se lo schermo è più piccolo di 765px, calcoliamo il fattore di scala
            const scale = Math.min(wrapperWidth / requiredWidth, 1);
            chartScale.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', fitChartToScreen);
        // Chiamata iniziale
        fitChartToScreen();


        // 3. Picking del Colore
        video.addEventListener('click', (event) => {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            // Dimensioni attuali dell'elemento video a schermo
            const rect = video.getBoundingClientRect();
            
            // Coordinate del click relative all'elemento video
            const xClick = event.clientX - rect.left;
            const yClick = event.clientY - rect.top;

            // Dimensioni reali del frame video (risoluzione intrinseca)
            const vidW = video.videoWidth;
            const vidH = video.videoHeight;

            // Impostiamo il canvas alle dimensioni del video originale
            canvas.width = vidW;
            canvas.height = vidH;

            // Disegniamo il frame attuale sul canvas
            ctx.drawImage(video, 0, 0, vidW, vidH);

            /* CALCOLO COORDINATE:
               Poiché usiamo object-fit: cover, parte del video potrebbe essere tagliata.
               Dobbiamo mappare le coordinate del click (schermo) alle coordinate del canvas (sorgente).
            */
            
            // Calcoliamo il rapporto di aspetto
            const videoRatio = vidW / vidH;
            const screenRatio = rect.width / rect.height;
            
            let sourceX, sourceY;

            if (screenRatio > videoRatio) {
                // Lo schermo è più "largo" del video: il video è tagliato sopra e sotto
                const scale = rect.width / vidW;
                const visibleHeight = vidH * scale;
                const offsetTop = (rect.height - visibleHeight) / 2;
                
                sourceX = xClick / scale;
                sourceY = (yClick - offsetTop) / scale;
            } else {
                // Lo schermo è più "alto" del video: il video è tagliato ai lati
                const scale = rect.height / vidH;
                const visibleWidth = vidW * scale;
                const offsetLeft = (rect.width - visibleWidth) / 2;
                
                sourceX = (xClick - offsetLeft) / scale;
                sourceY = yClick / scale;
            }

            // Assicuriamoci di non uscire dai bordi
            sourceX = Math.max(0, Math.min(vidW - 1, sourceX));
            sourceY = Math.max(0, Math.min(vidH - 1, sourceY));

            // Preleviamo il pixel
            const pixelData = ctx.getImageData(sourceX, sourceY, 1, 1).data;
            const r = pixelData[0];
            const g = pixelData[1];
            const b = pixelData[2];

            updateUI(r, g, b);
        });

        // 4. Aggiornamento Interfaccia
        function updateUI(r, g, b) {
            // Aggiorna le larghezze delle barre (direttamente in px come richiesto)
            barRed.style.width = `${r}px`;
            barGreen.style.width = `${g}px`;
            barBlue.style.width = `${b}px`;

            // Converti in Hex
            const hex = rgbToHex(r, g, b);

            // Aggiorna footer
            resultArea.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
            
            // Calcola contrasto testo (bianco o nero) per leggibilità
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            resultArea.style.color = luminance > 0.5 ? '#000' : '#fff';
            hexLabel.textContent = hex.toUpperCase();
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        // Avvio
        initCamera();

    </script>
</body>
</html>
